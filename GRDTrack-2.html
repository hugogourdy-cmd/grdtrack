*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--red:#ff4f3b;--green:#22c55e;--blue:#3b82f6;--yellow:#f59e0b;--pink:#ec4899;--bg:#0a0a0f;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:#e8e8f0;min-height:100vh;overflow-x:hidden;}
input,button,select{font-family:'Rajdhani',sans-serif;outline:none;border:none;}
button{cursor:pointer;}
::-webkit-scrollbar{display:none;}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative;}
.header{padding:50px 16px 14px;border-bottom:1px solid rgba(255,79,59,0.15);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:rgba(10,10,15,0.98);}
.header-sub{font-size:10px;letter-spacing:4px;color:var(--red);font-weight:700;}
.header-title{font-size:22px;font-weight:800;letter-spacing:1px;margin-top:2px;}
.weight-btn{background:rgba(255,79,59,0.12);border:1px solid rgba(255,79,59,0.3);border-radius:12px;padding:10px 14px;text-align:center;cursor:pointer;}
.weight-btn-label{font-size:9px;letter-spacing:2px;color:var(--red);font-weight:700;}
.weight-btn-val{font-size:17px;font-weight:800;}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:100px;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,15,0.97);border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-around;padding:12px 0 30px;z-index:50;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 16px;cursor:pointer;opacity:0.4;transition:opacity 0.2s;}
.nav-btn.active{opacity:1;}
.nav-icon{font-size:22px;}
.nav-label{font-size:8px;letter-spacing:2px;color:#888;font-weight:700;}
.nav-btn.active .nav-label{color:var(--red);}
.nav-dot{width:16px;height:2px;background:var(--red);border-radius:2px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px;}
.card-label{font-size:9px;letter-spacing:3px;color:#888;font-weight:700;}
.big-num{font-size:38px;font-weight:800;line-height:1;}
.bar-bg{background:rgba(255,255,255,0.06);border-radius:4px;height:6px;overflow:hidden;margin-top:4px;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
.btn-red{background:rgba(255,79,59,0.15);border:1px solid rgba(255,79,59,0.3);border-radius:8px;padding:6px 12px;color:var(--red);font-size:11px;font-weight:700;letter-spacing:1px;}

.big-btn-red{width:100%;padding:16px;background:rgba(255,79,59,0.18);border:1px solid rgba(255,79,59,0.35);border-radius:16px;color:#fff;font-size:15px;font-weight:800;letter-spacing:2px;margin-bottom:14px;}
.big-btn-green{width:100%;padding:16px;background:rgba(34,197,94,0.18);border:1px solid rgba(34,197,94,0.35);border-radius:16px;color:#fff;font-size:15px;font-weight:800;letter-spacing:2px;margin-bottom:14px;}
.date-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
.day-btn{min-width:50px;text-align:center;padding:10px 6px;border-radius:12px;cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);transition:all 0.2s;flex-shrink:0;}
.day-btn.active{background:rgba(255,79,59,0.2);border-color:rgba(255,79,59,0.5);}
.day-btn-day{font-size:9px;color:#666;letter-spacing:1px;font-weight:700;}
.day-btn.active .day-btn-day{color:var(--red);}
.day-btn-num{font-size:18px;font-weight:800;color:#999;}
.day-btn.active .day-btn-num{color:#fff;}
.day-dots{display:flex;gap:3px;justify-content:center;margin-top:3px;}
.dot{width:5px;height:5px;border-radius:50%;}
.ring{width:70px;height:70px;border-radius:50%;border:6px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}

.food-name{font-size:14px;font-weight:600;}
.food-sub{font-size:10px;color:#666;margin-top:2px;}
.food-cal{font-size:18px;color:var(--red);font-weight:800;}
.remove-btn{background:rgba(255,79,59,0.1);border-radius:8px;width:28px;height:28px;color:var(--red);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border:none;}
.macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.macro-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;}
.macro-card-label{font-size:8px;color:#666;letter-spacing:2px;font-weight:700;margin-bottom:4px;}
.macro-card-val{font-size:30px;font-weight:800;line-height:1;}
.macro-card-goal{font-size:9px;color:#444;margin:4px 0 8px;}
.ex-row{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;margin-bottom:6px;}
.ex-name{font-size:13px;font-weight:700;margin-bottom:6px;}
.set-badges{display:flex;gap:6px;flex-wrap:wrap;}
.set-badge{background:rgba(255,79,59,0.1);border:1px solid rgba(255,79,59,0.25);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--red);font-weight:700;}
.empty{text-align:center;padding:20px 0;color:#444;}
.empty-emoji{font-size:40px;margin-bottom:8px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{width:100%;background:#111118;border-radius:24px 24px 0 0;padding:28px;border:1px solid rgba(255,255,255,0.1);transform:translateY(100%);transition:transform 0.3s ease;max-height:85vh;overflow-y:auto;}
.modal-overlay.open .modal-box{transform:translateY(0);}
.search-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:#fff;font-size:15px;margin-bottom:14px;}

.food-pick-item{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:14px;cursor:pointer;margin-bottom:8px;}

.muscle-btn.active{background:rgba(255,79,59,0.2);border-color:rgba(255,79,59,0.4);color:var(--red);}
.ex-pick-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.ex-pick-btn{padding:10px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:#ccc;font-size:13px;font-weight:600;cursor:pointer;}

.set-num{color:#555;font-size:13px;width:20px;text-align:center;flex-shrink:0;}
.set-label{font-size:8px;color:#555;letter-spacing:1px;font-weight:700;margin-bottom:4px;}

.macro-bar-row{margin-bottom:10px;}
.macro-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}

.bar-col{display:flex;flex-direction:column;align-items:center;}
.bar-col-val{font-size:9px;color:#fff;margin-bottom:4px;}
.bar-col-bar{width:28px;background:var(--red);border-radius:4px;}

.cat-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700;letter-spacing:1px;margin-left:6px;}

.workout-name-input::placeholder{color:#444;}
.session-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;}

</head>

    </div>

  <div class="content" id="main-content"></div>
  <div class="nav">
    <div class="nav-btn active" onclick="setTab('home')" id="nav-home"><div class="nav-icon">⚡</div><div class="nav-label">ACCUEIL</div><div class="nav-dot"></div></div>

</div>

<!-- MODAL POIDS -->
<div class="modal-overlay" id="modal-weight">
  <div class="modal-box">
    <div style="font-size:18px;font-weight:800;letter-spacing:1px;margin-bottom:4px;">ENREGISTRER LE POIDS</div>
    <div class="card-label" id="weight-modal-date"></div>
    <input type="number" class="qty-input" id="weight-input" placeholder="Ex: 82.5" step="0.1">
    <button class="big-btn-red" onclick="saveWeight()">SAUVEGARDER</button>
    <div style="text-align:center;color:#666;font-size:14px;cursor:pointer;margin-top:8px;" onclick="closeModal('modal-weight')">Annuler</div>
  </div>
</div>

<!-- MODAL QUANTITÉ ALIMENT -->
<div class="modal-overlay" id="modal-food-qty">
  <div class="modal-box">
    <div style="font-size:50px;text-align:center;margin-bottom:8px;" id="qty-emoji"></div>
    <div style="font-size:18px;font-weight:800;text-align:center;margin-bottom:20px;" id="qty-food-name"></div>
    <div class="card-label" id="qty-unit-label"></div>
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin:16px 0;">
      <div class="step-btn-lg" onclick="changeQty(-1)">−</div>
      <input type="number" class="qty-input" id="qty-input" style="width:130px;margin:0;" value="100">
      <div class="step-btn-lg" onclick="changeQty(1)">+</div>
    </div>
    <div style="display:flex;justify-content:space-around;margin-bottom:20px;" id="qty-macros"></div>
    <button class="big-btn-green" onclick="confirmAddFood()">AJOUTER AU JOURNAL</button>
    <div style="text-align:center;color:#666;font-size:14px;cursor:pointer;margin-top:8px;" onclick="closeModal('modal-food-qty')">Annuler</div>
  </div>
</div>

// ══════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════
let state = {
  tab:"home", selectedDate:getToday(),
  nutritionLog:{}, workoutLog:{}, weights:[],
  showWorkoutBuilder:false, showFoodPicker:false,
  currentWorkout:null, selectedMuscle:"Dos",
  selectedFood:null, foodSearch:"", foodCat:"Tous",
  workoutName:"", workoutType:SESSION_TYPES[0],
  editingDate:null,
};

function getToday(){ return new Date().toISOString().split("T")[0]; }
function formatDate(d){ const dt=new Date(d+"T12:00:00"); return dt.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}); }
function getTotals(date){ return (state.nutritionLog[date]||[]).reduce((a,i)=>({cal:a.cal+i.cal,prot:a.prot+i.prot,carbs:a.carbs+i.carbs,fat:a.fat+i.fat}),{cal:0,prot:0,carbs:0,fat:0}); }

// ── STORAGE ───────────────────────────────────────────────────────────────
function loadData(){
  try{
    const n=localStorage.getItem("grdtrack_nutrition");
    const w=localStorage.getItem("grdtrack_workouts");
    const wt=localStorage.getItem("grdtrack_weights");
    if(n) state.nutritionLog=JSON.parse(n);
    if(w) state.workoutLog=JSON.parse(w);
    if(wt) state.weights=JSON.parse(wt);
  }catch(e){}
}
function saveData(){
  localStorage.setItem("grdtrack_nutrition",JSON.stringify(state.nutritionLog));
  localStorage.setItem("grdtrack_workouts",JSON.stringify(state.workoutLog));
  localStorage.setItem("grdtrack_weights",JSON.stringify(state.weights));
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function setTab(tab){
  state.tab=tab; state.showFoodPicker=false; state.showWorkoutBuilder=false;
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.remove("active");
    const d=b.querySelector(".nav-dot"); if(d) d.remove();
  });
  const nb=document.getElementById("nav-"+tab);
  if(nb){ nb.classList.add("active"); const d=document.createElement("div"); d.className="nav-dot"; nb.appendChild(d); }
  const titles={home:"TABLEAU DE BORD",nutrition:"NUTRITION",workout:"SÉANCES",stats:"STATISTIQUES"};
  document.getElementById("header-title").textContent=titles[tab];
  render();
}

// ══════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════
function render(){
  const c=document.getElementById("main-content");
  const lw=state.weights.length>0?state.weights[state.weights.length-1].val:null;
  document.getElementById("weight-display").textContent=lw?lw+" kg":"-- kg";
  if(state.tab==="home") c.innerHTML=renderHome();
  else if(state.tab==="nutrition") c.innerHTML=state.showFoodPicker?renderFoodPicker():renderNutrition();
  else if(state.tab==="workout") c.innerHTML=state.showWorkoutBuilder?renderWorkoutBuilder():renderWorkout();
  else if(state.tab==="stats") c.innerHTML=renderStats();
}

// ── HOME ──────────────────────────────────────────────────────────────────
function renderHome(){
  const t=getTotals(state.selectedDate);
  const pct=Math.min(Math.round((t.cal/GOALS.cal)*100),100);
  const tw=state.workoutLog[state.selectedDate];
  const tf=state.nutritionLog[state.selectedDate]||[];
  const dates=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split("T")[0];});
  const strip=dates.map(d=>{
    const di=new Date(d+"T12:00:00").getDay(),num=new Date(d+"T12:00:00").getDate();
    const hasN=!!(state.nutritionLog[d]?.length>0),hasW=!!state.workoutLog[d];
    return `<div class="day-btn ${d===state.selectedDate?"active":""}" onclick="selectDate('${d}')">
      <div class="day-btn-day">${DAYS[di]}</div><div class="day-btn-num">${num}</div>
      <div class="day-dots">${hasN?'<div class="dot" style="background:#22c55e"></div>':""}${hasW?'<div class="dot" style="background:var(--red)"></div>':""}</div>
    </div>`;
  }).join("");

  const macros=[
    {l:"PROTÉINES",v:t.prot,g:GOALS.prot,u:"g",c:"#3b82f6"},
    {l:"GLUCIDES",v:t.carbs,g:GOALS.carbs,u:"g",c:"#f59e0b"},
    {l:"LIPIDES",v:t.fat,g:GOALS.fat,u:"g",c:"#ec4899"},
  ].map(m=>`<div class="macro-bar-row">
    <div class="macro-row"><span class="card-label">${m.l}</span><span style="font-size:11px;font-weight:700;color:${m.c}">${m.v}${m.u} / ${m.g}${m.u}</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min((m.v/m.g)*100,100)}%;background:${m.c}"></div></div>
  </div>`).join("");

  const wSection=tw
    ? (tw.type?`<div style="margin-bottom:10px"><span class="session-tag" style="background:${tw.type.color}22;color:${tw.type.color};border:1px solid ${tw.type.color}44">${tw.type.label}</span>${tw.name?` <span style="font-size:13px;font-weight:700">${tw.name}</span>`:""}</div>`:"") +
      tw.exercises.map(ex=>`<div class="ex-row"><div class="ex-name">${ex.name}</div><div class="set-badges">${ex.sets.map(s=>`<span class="set-badge">${s.weight>0?s.weight+"kg×":""}${s.reps}</span>`).join("")}</div></div>`).join("")
    : `<div class="empty"><div class="empty-emoji">💪</div><div>Pas de séance enregistrée</div></div>`;

  const fSection=tf.length===0
    ?`<div class="empty"><div class="empty-emoji">🥗</div><div>Aucun repas enregistré</div></div>`
    :tf.map(f=>`<div class="food-row"><span style="font-size:24px">${f.emoji}</span><div style="flex:1;margin-left:8px"><div class="food-name">${f.name}</div><div class="food-sub">${f.qty}${f.unit==="g"?"g":" "+f.unit}</div></div><span class="food-cal">${f.cal} kcal</span><button class="remove-btn" onclick="removeFood('${f.id}')">×</button></div>`).join("");

  return `<div class="date-strip">${strip}</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div><div class="card-label">CALORIES</div>
          <div class="big-num" style="color:${t.cal>GOALS.cal?"var(--red)":"#fff"}">${t.cal} <span style="font-size:16px;color:#555">/ ${GOALS.cal}</span></div>
          <div style="color:#666;font-size:12px;margin-top:4px">${GOALS.cal-t.cal>0?GOALS.cal-t.cal+" kcal restantes":"Objectif dépassé !"}</div>
        </div><div class="ring">${pct}%</div>
      </div>${macros}
    </div>
    <div class="card"><div class="section-header"><div class="card-label">SÉANCE DU JOUR</div>${!tw?`<button class="btn-red" onclick="setTab('workout');state.showWorkoutBuilder=true;render()">+ AJOUTER</button>`:""}</div>${tw?`<div style="font-size:16px;font-weight:800;margin-bottom:10px">💪 ${tw.exercises.length} exercices</div>`:""}${wSection}</div>
    <div class="card"><div class="section-header"><div class="card-label">REPAS DU JOUR</div><button class="btn-green" onclick="setTab('nutrition');state.showFoodPicker=true;render()">+ AJOUTER</button></div>${fSection}</div>`;
}

// ── NUTRITION ─────────────────────────────────────────────────────────────
function renderNutrition(){
  const t=getTotals(state.selectedDate);
  const f=state.nutritionLog[state.selectedDate]||[];
  const macros=[
    {l:"CALORIES",v:t.cal,g:GOALS.cal,u:"kcal",c:"var(--red)"},
    {l:"PROTÉINES",v:t.prot,g:GOALS.prot,u:"g",c:"#3b82f6"},
    {l:"GLUCIDES",v:t.carbs,g:GOALS.carbs,u:"g",c:"#f59e0b"},
    {l:"LIPIDES",v:t.fat,g:GOALS.fat,u:"g",c:"#ec4899"},
  ].map(m=>`<div class="macro-card"><div class="macro-card-label">${m.l}</div><div class="macro-card-val" style="color:${m.c}">${m.v}</div><div class="macro-card-goal">/ ${m.g} ${m.u}</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min((m.v/m.g)*100,100)}%;background:${m.c}"></div></div></div>`).join("");
  const fList=f.length===0
    ?`<div class="empty"><div class="empty-emoji">🥗</div><div>Aucun repas enregistré</div></div>`
    :f.map(fo=>`<div class="card" style="display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:8px;">
      <span style="font-size:28px">${fo.emoji}</span>
      <div style="flex:1"><div class="food-name">${fo.name}</div><div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap"><span style="font-size:11px;color:#3b82f6;font-weight:700">P ${fo.prot}g</span><span style="font-size:11px;color:#f59e0b;font-weight:700">G ${fo.carbs}g</span><span style="font-size:11px;color:#ec4899;font-weight:700">L ${fo.fat}g</span></div></div>
      <div style="text-align:right"><div class="food-cal">${fo.cal}</div><div style="font-size:10px;color:#555">kcal</div></div>
      <button class="remove-btn" onclick="removeFood('${fo.id}')">×</button>
    </div>`).join("");
  return `<div class="macro-grid">${macros}</div><button class="big-btn-green" onclick="state.showFoodPicker=true;render()">+ AJOUTER UN ALIMENT</button>${fList}`;
}

// ── FOOD PICKER ───────────────────────────────────────────────────────────
function renderFoodPicker(){
  const cats=["Tous",...new Set(FOODS.map(f=>f.cat))];
  const catBtns=cats.map(c=>`<div class="muscle-btn ${c===state.foodCat?"active":""}" onclick="state.foodCat='${c}';render()">${c}</div>`).join("");
  const filtered=FOODS.filter(f=>{
    const matchCat=state.foodCat==="Tous"||f.cat===state.foodCat;
    const matchSearch=f.name.toLowerCase().includes(state.foodSearch.toLowerCase());
    return matchCat&&matchSearch;
  });
  const items=filtered.map(f=>`<div class="food-pick-item" onclick="openFoodQty(${f.id})">
    <span style="font-size:28px">${f.emoji}</span>
    <div style="flex:1"><div class="food-name">${f.name}</div><div class="food-sub">${f.cal} kcal · P${f.prot}g · G${f.carbs}g · L${f.fat}g / ${f.unit==="g"?"100g":f.unit}</div></div>
    <span style="color:var(--red);font-size:22px">+</span>
  </div>`).join("");
  return `<div class="flex-row" style="margin-bottom:12px">
    <div class="back-btn" onclick="state.showFoodPicker=false;render()">←</div>
    <input class="search-input" style="margin:0;flex:1" placeholder="Rechercher parmi ${FOODS.length} aliments..." value="${state.foodSearch}" oninput="state.foodSearch=this.value;render()">
  </div>
  <div class="muscle-strip" style="margin-bottom:14px">${catBtns}</div>
  <div style="font-size:11px;color:#555;margin-bottom:10px">${filtered.length} aliment${filtered.length>1?"s":""}</div>
  ${items||'<div class="empty"><div>Aucun résultat</div></div>'}`;
}

// ── WORKOUT ───────────────────────────────────────────────────────────────
function renderWorkout(){
  const days=Object.keys(state.workoutLog).sort().reverse();
  const list=days.length===0
    ?`<div class="empty" style="margin-top:60px"><div class="empty-emoji">🏋️</div><div>Aucune séance enregistrée</div></div>`
    :days.map(date=>{
      const w=state.workoutLog[date];
      const maxW=Math.max(0,...w.exercises.flatMap(ex=>ex.sets.map(s=>s.weight)));
      return `<div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div class="card-label" style="color:var(--red)">${formatDate(date).toUpperCase()}</div>
            <div style="font-size:17px;font-weight:800;margin-top:2px">${w.name||"Séance"}</div>
            ${w.type?`<span class="session-tag" style="background:${w.type.color}22;color:${w.type.color};border:1px solid ${w.type.color}44;margin-top:4px;display:inline-block">${w.type.label}</span>`:""}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            ${maxW>0?`<div class="pr-badge"><div style="font-size:9px;color:#888">MAX</div><div style="font-size:15px;font-weight:800;color:var(--red)">${maxW}kg</div></div>`:""}
            <button class="btn-red" onclick="editWorkout('${date}')" style="font-size:11px;padding:5px 10px">✏️ Modifier</button>
          </div>
        </div>
        ${w.exercises.map(ex=>`<div class="ex-row"><div class="ex-name">${ex.name}</div><div class="set-badges">${ex.sets.map(s=>`<span class="set-badge">${s.weight>0?s.weight+"kg×":""}${s.reps}</span>`).join("")}</div></div>`).join("")}
      </div>`;
    }).join("");
  return `<button class="big-btn-red" onclick="state.currentWorkout=null;state.workoutName='';state.workoutType=SESSION_TYPES[0];state.showWorkoutBuilder=true;render()">+ NOUVELLE SÉANCE</button>${list}`;
}

// ── WORKOUT BUILDER ───────────────────────────────────────────────────────
function renderWorkoutBuilder(){
  const typeBtns=SESSION_TYPES.map((t,i)=>`<div class="muscle-btn ${state.workoutType.label===t.label?"active":""}" onclick="state.workoutType=SESSION_TYPES[${i}];render()" style="${state.workoutType.label===t.label?"color:"+t.color+";border-color:"+t.color+"66;background:"+t.color+"22":""}">${t.label}</div>`).join("");
  const muscles=Object.keys(EXERCISES).map(g=>`<div class="muscle-btn ${g===state.selectedMuscle?"active":""}" onclick="state.selectedMuscle='${g}';render()">${g}</div>`).join("");
  const exBtns=EXERCISES[state.selectedMuscle].map(ex=>{
    const added=state.currentWorkout?.exercises?.some(e=>e.name===ex);
    return `<div class="ex-pick-btn ${added?"added":""}" onclick="addExercise('${ex.replace(/'/g,"\\'")}')">${added?"✓ ":""}${ex}</div>`;
  }).join("");

  let setEditors="";
  if(state.currentWorkout?.exercises?.length>0){
    setEditors=`<div class="card-label" style="margin-bottom:12px">SÉRIES & CHARGES</div>`+
    state.currentWorkout.exercises.map((ex,ei)=>`<div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:15px;font-weight:800;flex:1">${ex.name}</div>
        <div style="display:flex;gap:8px"><button class="btn-red" onclick="addSet(${ei})">+ SET</button><button class="remove-btn" onclick="removeExercise(${ei})">×</button></div>
      </div>
      ${ex.sets.map((s,si)=>`<div class="set-editor">
        <span class="set-num">${si+1}</span>
        <div style="flex:1">
          <div class="set-label">CHARGE (kg)</div>
          <div style="display:flex;align-items:center;gap:5px">
            <button class="step-btn" onclick="updateSet(${ei},${si},'weight',${Math.max(0,s.weight-2.5)})">−</button>
            <input class="set-input" type="number" value="${s.weight}" onchange="updateSet(${ei},${si},'weight',parseFloat(this.value)||0)">
            <button class="step-btn" onclick="updateSet(${ei},${si},'weight',${s.weight+2.5})">+</button>
          </div>
        </div>
        <div>
          <div class="set-label">REPS</div>
          <div style="display:flex;align-items:center;gap:5px">
            <button class="step-btn" onclick="updateSet(${ei},${si},'reps',${Math.max(1,s.reps-1)})">−</button>
            <input class="set-input" type="number" value="${s.reps}" style="width:52px" onchange="updateSet(${ei},${si},'reps',parseInt(this.value)||1)">
            <button class="step-btn" onclick="updateSet(${ei},${si},'reps',${s.reps+1})">+</button>
          </div>
        </div>
      </div>`).join("")}
    </div>`).join("")+
    `<button class="big-btn-red" onclick="saveWorkout()">${state.editingDate?"💾 ENREGISTRER LES MODIFICATIONS":"💾 SAUVEGARDER LA SÉANCE"}</button>`;
  }

  const isEditing=state.editingDate&&state.editingDate!==state.selectedDate;
  const modeLabel=state.editingDate?`MODIFICATION — ${formatDate(state.editingDate).toUpperCase()}`:`NOUVELLE SÉANCE — ${formatDate(state.selectedDate).toUpperCase()}`;
  return `<div class="flex-row" style="margin-bottom:14px">
    <div class="back-btn" onclick="state.showWorkoutBuilder=false;state.currentWorkout=null;state.editingDate=null;render()">←</div>
    <div>
      <div class="card-label">${modeLabel}</div>
      ${state.editingDate?`<div style="font-size:10px;color:#f59e0b;margin-top:2px">✏️ Modification en cours</div>`:""}
    </div>
  </div>
  <input class="workout-name-input" placeholder="Nom de la séance (ex: Push A, Dos & Biceps...)" value="${state.workoutName}" oninput="state.workoutName=this.value">
  <div class="card-label" style="margin-bottom:8px">TYPE DE SÉANCE</div>
  <div class="muscle-strip" style="margin-bottom:16px">${typeBtns}</div>
  <div class="card-label" style="margin-bottom:8px">GROUPE MUSCULAIRE</div>
  <div class="muscle-strip">${muscles}</div>
  <div class="card-label" style="margin-bottom:10px">EXERCICES — ${state.selectedMuscle}</div>
  <div class="ex-pick-grid">${exBtns}</div>
  ${setEditors}`;
}

// ── STATS ─────────────────────────────────────────────────────────────────
function renderStats(){
  const wdays=Object.keys(state.workoutLog);
  const totalEx=Object.values(state.workoutLog).reduce((a,w)=>a+w.exercises.length,0);
  const totalSets=Object.values(state.workoutLog).reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.length,0),0);
  const bests={};
  Object.values(state.workoutLog).forEach(w=>w.exercises.forEach(ex=>{
    const mw=Math.max(0,...ex.sets.map(s=>s.weight));
    if(mw>0&&(!bests[ex.name]||mw>bests[ex.name])) bests[ex.name]=mw;
  }));
  const bestsList=Object.entries(bests).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([n,w])=>`<div class="pr-row"><span style="font-size:14px;font-weight:600">${n}</span><span style="font-size:20px;font-weight:800;color:var(--red)">${w} kg</span></div>`).join("")
    ||`<div class="empty"><div>Tes records apparaîtront ici</div></div>`;

  let wChart=`<div class="empty"><div>Ajoute ton poids régulièrement</div></div>`;
  if(state.weights.length>=2){
    const wts=state.weights.slice(-20);
    const vals=wts.map(w=>w.val);
    const mn=Math.min(...vals)-1,mx=Math.max(...vals)+1;
    wChart=`<div class="bar-chart">${wts.map(w=>{
      const h=Math.round(((w.val-mn)/(mx-mn))*80+10);
      return `<div class="bar-col"><div class="bar-col-val">${w.val}</div><div class="bar-col-bar" style="height:${h}px"></div><div class="bar-col-date">${new Date(w.date+"T12:00:00").getDate()}</div></div>`;
    }).join("")}</div>`;
  }

  // Sessions par type
  const typeCount={};
  Object.values(state.workoutLog).forEach(w=>{if(w.type) typeCount[w.type.label]=(typeCount[w.type.label]||0)+1;});
  const typeStats=Object.entries(typeCount).map(([l,c])=>{
    const t=SESSION_TYPES.find(s=>s.label===l);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
      <span class="session-tag" style="background:${t?.color||"#888"}22;color:${t?.color||"#888"};border:1px solid ${t?.color||"#888"}44">${l}</span>
      <span style="font-size:16px;font-weight:800;color:#fff">${c} séance${c>1?"s":""}</span>
    </div>`;
  }).join("") || `<div class="empty"><div>Pas encore de séances</div></div>`;

  return `
    <div class="card"><div class="card-label" style="margin-bottom:14px">ÉVOLUTION DU POIDS</div>${wChart}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="card" style="padding:14px;text-align:center"><div class="card-label">SÉANCES</div><div style="font-size:30px;font-weight:800;color:var(--red)">${wdays.length}</div></div>
      <div class="card" style="padding:14px;text-align:center"><div class="card-label">EXERCICES</div><div style="font-size:30px;font-weight:800;color:#3b82f6">${totalEx}</div></div>
      <div class="card" style="padding:14px;text-align:center"><div class="card-label">SÉRIES</div><div style="font-size:30px;font-weight:800;color:#f59e0b">${totalSets}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px"><div class="card-label" style="margin-bottom:12px">SÉANCES PAR TYPE</div>${typeStats}</div>
    <div class="card" style="margin-bottom:30px"><div class="card-label" style="margin-bottom:14px">RECORDS PERSONNELS 🏆</div>${bestsList}</div>`;
}

// ══════════════════════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════════════════════
function selectDate(d){ state.selectedDate=d; render(); }

function removeFood(id){
  state.nutritionLog[state.selectedDate]=(state.nutritionLog[state.selectedDate]||[]).filter(f=>f.id!=id);
  saveData(); render();
}

function openFoodQty(foodId){
  const food=FOODS.find(f=>f.id===foodId);
  state.selectedFood=food;
  document.getElementById("qty-emoji").textContent=food.emoji;
  document.getElementById("qty-food-name").textContent=food.name;
  document.getElementById("qty-unit-label").textContent="QUANTITÉ ("+(food.unit==="g"?"grammes":food.unit)+")";
  document.getElementById("qty-input").value=food.unit!=="g"?1:100;
  updateQtyMacros();
  openModal("modal-food-qty");
}

function changeQty(dir){
  const food=state.selectedFood;
  const step=food.unit!=="g"?1:10;
  const inp=document.getElementById("qty-input");
  inp.value=Math.max(1,(parseFloat(inp.value)||0)+dir*step);
  updateQtyMacros();
}

function updateQtyMacros(){
  const food=state.selectedFood; if(!food) return;
  const qty=parseFloat(document.getElementById("qty-input").value)||0;
  const r=food.unit!=="g"?qty:qty/100;
  document.getElementById("qty-macros").innerHTML=[
    {l:"CAL",v:Math.round(food.cal*r),c:"var(--red)"},
    {l:"PROT",v:Math.round(food.prot*r*10)/10+"g",c:"#3b82f6"},
    {l:"GLUC",v:Math.round(food.carbs*r*10)/10+"g",c:"#f59e0b"},
    {l:"LIP",v:Math.round(food.fat*r*10)/10+"g",c:"#ec4899"},
  ].map(m=>`<div style="text-align:center;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;min-width:58px">
    <div style="font-size:8px;color:#666;letter-spacing:1px;font-weight:700">${m.l}</div>
    <div style="font-size:16px;font-weight:800;color:${m.c};margin-top:2px">${m.v}</div>
  </div>`).join("");
}

document.getElementById("qty-input").addEventListener("input",updateQtyMacros);

function confirmAddFood(){
  const food=state.selectedFood;
  const qty=parseFloat(document.getElementById("qty-input").value)||100;
  const r=food.unit!=="g"?qty:qty/100;
  const entry={id:Date.now(),name:food.name,emoji:food.emoji,qty,unit:food.unit,
    cal:Math.round(food.cal*r),prot:Math.round(food.prot*r*10)/10,
    carbs:Math.round(food.carbs*r*10)/10,fat:Math.round(food.fat*r*10)/10};
  if(!state.nutritionLog[state.selectedDate]) state.nutritionLog[state.selectedDate]=[];
  state.nutritionLog[state.selectedDate].push(entry);
  saveData(); closeModal("modal-food-qty");
  state.showFoodPicker=false; state.foodSearch=""; render();
}

function addExercise(name){
  const ex={name,sets:[{reps:10,weight:0}]};
  if(!state.currentWorkout) state.currentWorkout={date:state.selectedDate,exercises:[ex],name:state.workoutName,type:state.workoutType};
  else{ if(state.currentWorkout.exercises.some(e=>e.name===name)) return; state.currentWorkout.exercises.push(ex); }
  render();
}

function addSet(ei){
  const last=state.currentWorkout.exercises[ei].sets.slice(-1)[0];
  state.currentWorkout.exercises[ei].sets.push({...last});
  render();
}

function updateSet(ei,si,field,val){
  state.currentWorkout.exercises[ei].sets[si][field]=val; render();
}

function removeExercise(idx){
  state.currentWorkout.exercises.splice(idx,1); render();
}

function editWorkout(date){
  const w=state.workoutLog[date];
  if(!w) return;
  // Deep copy pour éviter de modifier l'original en cours d'édition
  state.currentWorkout=JSON.parse(JSON.stringify(w));
  state.workoutName=w.name||"";
  state.workoutType=w.type||SESSION_TYPES[0];
  state.editingDate=date;
  state.showWorkoutBuilder=true;
  render();
}

function saveWorkout(){
  if(!state.currentWorkout||state.currentWorkout.exercises.length===0){alert("Ajoute au moins un exercice !");return;}
  state.currentWorkout.name=state.workoutName||"Séance";
  state.currentWorkout.type=state.workoutType;
  const targetDate=state.editingDate||state.selectedDate;
  state.workoutLog[targetDate]=state.currentWorkout;
  saveData();
  state.showWorkoutBuilder=false;
  state.currentWorkout=null;
  state.editingDate=null;
  render();
}

function openWeightModal(){
  document.getElementById("weight-modal-date").textContent=new Date().toLocaleDateString("fr-FR");
  document.getElementById("weight-input").value="";
  openModal("modal-weight");
}

function saveWeight(){
  const val=parseFloat(document.getElementById("weight-input").value);
  if(!val||val<20||val>300){alert("Entre un poids valide");return;}
  state.weights.push({date:getToday(),val});
  saveData(); closeModal("modal-weight"); render();
}

function openModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
document.querySelectorAll(".modal-overlay").forEach(m=>m.addEventListener("click",e=>{if(e.target===m)m.classList.remove("open");}));

loadData();
render();
</script>
</body>
</html>
